<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitPet — Diseños Stitch</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f1115;
      color: #fff;
      padding: 24px;
    }
    h1 { font-size: 24px; margin-bottom: 4px; }
    p.sub { color: #9aa0aa; font-size: 14px; margin-bottom: 24px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }
    .card {
      background: #1a1d24;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #2a2e38;
    }
    .card h2 { font-size: 14px; padding: 12px 16px; color: #e8eaed; }
    .frame-wrap {
      height: 620px;
      overflow: hidden;
      background: #fff;
      position: relative;
    }
    iframe {
      width: 390px;
      height: 1400px;
      border: 0;
      transform-origin: top left;
      transform: scale(0.86);
    }
    a.open {
      display: block;
      text-align: center;
      padding: 10px;
      background: #2563ff;
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>🐾 FitPet — Diseños de Stitch</h1>
  <p class="sub">13 pantallas generadas con Google Stitch · proyecto "FitPet Gamified Fitness Tracker"</p>
  <div class="grid" id="grid"></div>
  <script>
    const screens = [
      ["01-mascota-animada.html", "Mi FitPet — Mascota Animada"],
      ["02-actividad-diaria.html", "Actividad Diaria — Fitbit Air"],
      ["03-cyber-ecosystem.html", "Cyber Fitness Ecosystem / Perfil"],
      ["04-comunidad-social.html", "Comunidad Social"],
      ["05-registrar-actividad.html", "Registrar Entrenamiento"],
      ["06-desglose-nutricional.html", "Nutrición Detallada"],
      ["07-estado-sedentario.html", "Mascota — Estado Sedentario"],
      ["08-conectar-fitbit.html", "Conectar Fitbit Air"],
      ["09-diario-nutricional.html", "Diario Nutricional"],
      ["10-perfil-usuario.html", "Perfil de Usuario"],
      ["11-entrenamiento.html", "Entrenamiento en Curso"],
      ["12-mascota-flaco.html", "Mascota — Modo Flaco"],
    ];
    const grid = document.getElementById("grid");
    for (const [file, title] of screens) {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h2>${title}</h2>
        <div class="frame-wrap"><iframe src="${file}" scrolling="no"></iframe></div>
        <a class="open" href="${file}" target="_blank">Abrir a pantalla completa ↗</a>`;
      grid.appendChild(card);
    }
  </script>
</body>
</html>
